<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100" fill="none">
  <defs>
    <!-- Dégradé immeuble : bleu profond en bas → cyan en haut -->
    <linearGradient id="bldg-stroke" x1="30" y1="90" x2="50" y2="10" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1B3A7B"/>
      <stop offset="100%" stop-color="#5BB8D4"/>
    </linearGradient>
    <!-- Halo sparkle -->
    <radialGradient id="spark-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5FE0F0" stop-opacity="0.7"/>
      <stop offset="60%" stop-color="#5FE0F0" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#5FE0F0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ─── Immeuble gauche (plus court) ─── -->
  <rect x="8" y="34" width="30" height="52" rx="1.5" stroke="url(#bldg-stroke)" stroke-width="2.2" fill="none"/>
  <!-- Fenêtres gauche -->
  <rect x="14" y="42" width="7" height="6" rx="1" stroke="url(#bldg-stroke)" stroke-width="1.5" fill="none"/>
  <rect x="25" y="42" width="7" height="6" rx="1" stroke="url(#bldg-stroke)" stroke-width="1.5" fill="none"/>
  <rect x="14" y="54" width="7" height="6" rx="1" stroke="url(#bldg-stroke)" stroke-width="1.5" fill="none"/>
  <rect x="25" y="54" width="7" height="6" rx="1" stroke="url(#bldg-stroke)" stroke-width="1.5" fill="none"/>
  <rect x="14" y="66" width="7" height="6" rx="1" stroke="url(#bldg-stroke)" stroke-width="1.5" fill="none"/>
  <rect x="25" y="66" width="7" height="6" rx="1" stroke="url(#bldg-stroke)" stroke-width="1.5" fill="none"/>
  <!-- Porte gauche -->
  <rect x="18" y="76" width="10" height="10" rx="1.5" stroke="url(#bldg-stroke)" stroke-width="1.5" fill="none"/>

  <!-- ─── Immeuble droit (plus grand) ─── -->
  <rect x="40" y="18" width="34" height="68" rx="1.5" stroke="url(#bldg-stroke)" stroke-width="2.2" fill="none"/>
  <!-- Toit / avant-toit -->
  <path d="M40 18 L47 10 L67 10 L74 18" stroke="url(#bldg-stroke)" stroke-width="2.2" fill="none" stroke-linejoin="round"/>
  <!-- Fenêtres droite -->
  <rect x="46" y="26" width="7" height="6" rx="1" stroke="url(#bldg-stroke)" stroke-width="1.5" fill="none"/>
  <rect x="61" y="26" width="7" height="6" rx="1" stroke="url(#bldg-stroke)" stroke-width="1.5" fill="none"/>
  <rect x="46" y="38" width="7" height="6" rx="1" stroke="url(#bldg-stroke)" stroke-width="1.5" fill="none"/>
  <rect x="61" y="38" width="7" height="6" rx="1" stroke="url(#bldg-stroke)" stroke-width="1.5" fill="none"/>
  <rect x="46" y="50" width="7" height="6" rx="1" stroke="url(#bldg-stroke)" stroke-width="1.5" fill="none"/>
  <rect x="61" y="50" width="7" height="6" rx="1" stroke="url(#bldg-stroke)" stroke-width="1.5" fill="none"/>
  <rect x="46" y="62" width="7" height="6" rx="1" stroke="url(#bldg-stroke)" stroke-width="1.5" fill="none"/>
  <rect x="61" y="62" width="7" height="6" rx="1" stroke="url(#bldg-stroke)" stroke-width="1.5" fill="none"/>
  <!-- Porte droite -->
  <rect x="52" y="76" width="10" height="10" rx="1.5" stroke="url(#bldg-stroke)" stroke-width="1.5" fill="none"/>

  <!-- ─── Ligne de sol ─── -->
  <line x1="4" y1="86" x2="78" y2="86" stroke="url(#bldg-stroke)" stroke-width="2" stroke-linecap="round"/>

  <!-- ─── Sparkle (étoile lumineuse) ─── -->
  <!-- Halo -->
  <circle cx="72" cy="8" r="14" fill="url(#spark-glow)"/>
  <!-- Point central -->
  <circle cx="72" cy="8" r="3" fill="#5FE0F0"/>
  <circle cx="72" cy="8" r="1.5" fill="white"/>
  <!-- Rayons -->
  <line x1="72" y1="-3" x2="72" y2="0" stroke="#8AEAF5" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <line x1="72" y1="16" x2="72" y2="19" stroke="#8AEAF5" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <line x1="61" y1="8" x2="64" y2="8" stroke="#8AEAF5" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <line x1="80" y1="8" x2="83" y2="8" stroke="#8AEAF5" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <!-- Rayons diagonaux -->
  <line x1="64" y1="0" x2="66" y2="2" stroke="#8AEAF5" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  <line x1="80" y1="0" x2="78" y2="2" stroke="#8AEAF5" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  <line x1="64" y1="16" x2="66" y2="14" stroke="#8AEAF5" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  <line x1="80" y1="16" x2="78" y2="14" stroke="#8AEAF5" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  <!-- Trait reliant sparkle au bâtiment -->
  <line x1="72" y1="11" x2="72" y2="18" stroke="#8AEAF5" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>

  <!-- ─── Texte : mygestia.immo ─── -->
  <text y="64" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="38" letter-spacing="-0.5">
    <tspan x="100" fill="#8BA4BD" font-weight="400">my</tspan><tspan fill="#0C2340" font-weight="600">gestia</tspan><tspan fill="#7B9BB5" font-weight="400">.immo</tspan>
  </text>
</svg>
