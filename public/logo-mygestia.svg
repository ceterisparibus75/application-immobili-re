<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 64" fill="none">
  <defs>
    <linearGradient id="bldg" x1="0" y1="48" x2="46" y2="4" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0C2340"/>
      <stop offset="50%" stop-color="#1B4F8A"/>
      <stop offset="100%" stop-color="#22B8CF"/>
    </linearGradient>
    <radialGradient id="spark" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22B8CF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#22B8CF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Building left (shorter) -->
  <rect x="2" y="18" width="20" height="30" rx="1.5" fill="url(#bldg)"/>
  <!-- Windows left -->
  <rect x="6" y="23" width="4" height="4" rx="0.8" fill="rgba(255,255,255,0.85)"/>
  <rect x="14" y="23" width="4" height="4" rx="0.8" fill="rgba(255,255,255,0.85)"/>
  <rect x="6" y="31" width="4" height="4" rx="0.8" fill="rgba(255,255,255,0.85)"/>
  <rect x="14" y="31" width="4" height="4" rx="0.8" fill="rgba(255,255,255,0.85)"/>
  <!-- Door left -->
  <rect x="9" y="40" width="6" height="8" rx="1" fill="rgba(255,255,255,0.5)"/>

  <!-- Building right (taller) -->
  <rect x="24" y="8" width="22" height="40" rx="1.5" fill="url(#bldg)"/>
  <!-- Windows right -->
  <rect x="28" y="13" width="4" height="4" rx="0.8" fill="rgba(255,255,255,0.85)"/>
  <rect x="38" y="13" width="4" height="4" rx="0.8" fill="rgba(255,255,255,0.85)"/>
  <rect x="28" y="21" width="4" height="4" rx="0.8" fill="rgba(255,255,255,0.85)"/>
  <rect x="38" y="21" width="4" height="4" rx="0.8" fill="rgba(255,255,255,0.85)"/>
  <rect x="28" y="29" width="4" height="4" rx="0.8" fill="rgba(255,255,255,0.85)"/>
  <rect x="38" y="29" width="4" height="4" rx="0.8" fill="rgba(255,255,255,0.85)"/>
  <!-- Door right -->
  <rect x="31" y="40" width="6" height="8" rx="1" fill="rgba(255,255,255,0.5)"/>

  <!-- Sparkle on top -->
  <circle cx="45" cy="6" r="8" fill="url(#spark)"/>
  <circle cx="45" cy="6" r="2.5" fill="#22B8CF"/>
  <!-- Star rays -->
  <line x1="45" y1="0" x2="45" y2="3" stroke="#22B8CF" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <line x1="45" y1="9" x2="45" y2="12" stroke="#22B8CF" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <line x1="39" y1="6" x2="42" y2="6" stroke="#22B8CF" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <line x1="48" y1="6" x2="51" y2="6" stroke="#22B8CF" stroke-width="1" stroke-linecap="round" opacity="0.6"/>

  <!-- Text: mygestia -->
  <text x="62" y="38" font-family="Inter, -apple-system, sans-serif" font-size="28" letter-spacing="-0.02em">
    <tspan fill="#64748B" font-weight="400">my</tspan><tspan fill="#0C2340" font-weight="700">gestia</tspan>
  </text>

  <!-- .immo -->
  <text x="218" y="38" font-family="Inter, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#22B8CF" letter-spacing="-0.02em">.immo</text>
</svg>
