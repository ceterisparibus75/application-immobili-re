name: Business E2E

on:
  workflow_dispatch:
  schedule:
    # Staging business proof: every Monday at 04:00 UTC.
    - cron: "0 4 * * 1"

concurrency:
  group: business-e2e-${{ github.ref }}
  cancel-in-progress: false

jobs:
  business-e2e:
    name: Staging Business Flow
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --legacy-peer-deps
      - run: npx prisma generate
      - run: npx playwright install --with-deps chromium
      - name: Check staging secrets
        run: |
          if [ -z "$E2E_BASE_URL" ] || [ -z "$E2E_EMAIL" ] || [ -z "$E2E_PASSWORD" ]; then
            echo "::error::Missing E2E_STAGING_URL, E2E_EMAIL or E2E_PASSWORD secret."
            exit 1
          fi
        env:
          E2E_BASE_URL: ${{ secrets.E2E_STAGING_URL }}
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
      - run: npm run test:e2e:business
        env:
          E2E_RUN_BUSINESS_FLOWS: "1"
          E2E_BASE_URL: ${{ secrets.E2E_STAGING_URL }}
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
      - name: Upload business E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: business-e2e-report
          path: playwright-report/
          retention-days: 7
